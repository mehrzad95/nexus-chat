name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server-lint-build:
    name: Server — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript check
        working-directory: server
        run: npx tsc --noEmit

      - name: Build
        working-directory: server
        run: npm run build

  client-lint-build:
    name: Client — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit

      - name: Build
        working-directory: client
        run: npm run build

  docker-build:
    name: Docker — validate images build
    runs-on: ubuntu-latest
    needs: [server-lint-build, client-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build --target production -t nexus-chat-server ./server

      - name: Build client image
        run: docker build --target production -t nexus-chat-client ./client