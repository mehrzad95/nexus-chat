name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus-chat-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus-chat-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus-chat-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus-chat-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max